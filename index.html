// ── apple-touch-icons: async load del SVG real ──────────────────────────────
(function(){
  var img=new Image();
  img.onload=function(){
    [180,152,120].forEach(function(sz){
      var cv=document.createElement("canvas");cv.width=sz;cv.height=sz;
      var ctx=cv.getContext("2d");
      ctx.drawImage(img,0,0,sz,sz);
      var l=document.createElement("link");l.rel="apple-touch-icon";
      l.sizes=sz+"x"+sz;l.href=cv.toDataURL("image/png");
      document.head.appendChild(l);
    });
  };
  img.src=_D_ICON;
})();

// ── Splash screens: logo completo centrado sobre fondo dark ─────────────────
(function(){
  var sizes=[{w:1290,h:2796,r:3},{w:1179,h:2556,r:3},{w:1170,h:2532,r:3},
             {w:1080,h:2340,r:3},{w:828,h:1792,r:2},{w:1125,h:2436,r:3},
             {w:750,h:1334,r:2},{w:2048,h:2732,r:2},{w:1668,h:2388,r:2}];
  var logo=new Image();
  logo.onload=function(){
    sizes.forEach(function(s){
      var cv=document.createElement("canvas");cv.width=s.w;cv.height=s.h;
      var ctx=cv.getContext("2d");
      // fondo degradado dark navy
      var bg=ctx.createLinearGradient(0,0,0,s.h);
      bg.addColorStop(0,"#0d2244");bg.addColorStop(1,"#070f1e");
      ctx.fillStyle=bg;ctx.fillRect(0,0,s.w,s.h);
      // logo completo centrado (ratio 440x120 → escalar al 70% del ancho)
      var lw=Math.round(s.w*0.70);
      var lh=Math.round(lw*(120/440));
      var lx=Math.round((s.w-lw)/2);
      var ly=Math.round(s.h*0.5-lh/2);
      ctx.drawImage(logo,lx,ly,lw,lh);
      // tagline debajo
      ctx.fillStyle="rgba(122,156,200,0.55)";
      ctx.font="bold "+Math.round(s.w*0.028)+"px system-ui,sans-serif";
      ctx.textAlign="center";
      ctx.fillText("CB JACA",s.w/2,ly+lh+Math.round(s.h*0.045));
      var lk=document.createElement("link");lk.rel="apple-touch-startup-image";
      lk.href=cv.toDataURL("image/png");
      lk.media="(device-width:"+Math.round(s.w/s.r)+"px) and (device-height:"+Math.round(s.h/s.r)+"px) and (-webkit-device-pixel-ratio:"+s.r+")";
      document.head.appendChild(lk);
    });
  };
  logo.src=_D_FULL;
})();

// v1.8.6 · B-NEW-4: notificar al usuario cuando hay una versión nueva del SW
// esperando. Antes el SW se actualizaba en silencio y los usuarios con la PWA
// instalada se quedaban en la versión vieja hasta cerrar todas las pestañas.
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js",{scope:"./"}).then((reg)=>{
    let _didSkipWaiting=false,_reloading=false;
    function _showUpdateBanner(waitingSW){
      if(document.getElementById("kl-sw-update"))return;
      const b=document.createElement("div");
      b.id="kl-sw-update";
      b.style.cssText="position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%);z-index:10000;background:#070f1e;border:1.5px solid #F06318;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:system-ui,sans-serif;color:#fff;font-size:13px;font-weight:600;max-width:92vw";
      b.innerHTML='<span>🔄 Nueva versión disponible</span><button id="kl-sw-reload" style="background:#F06318;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-weight:700;cursor:pointer">Actualizar</button><button id="kl-sw-dismiss" style="background:transparent;border:none;color:#9ca3af;cursor:pointer;font-size:18px;line-height:1">×</button>';
      document.body.appendChild(b);
      document.getElementById("kl-sw-reload").onclick=()=>{
        _didSkipWaiting=true;
        waitingSW.postMessage("SKIP_WAITING");
      };
      document.getElementById("kl-sw-dismiss").onclick=()=>b.remove();
    }
    if(reg.waiting)_showUpdateBanner(reg.waiting);
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          _showUpdateBanner(nw);
        }
      });
    });
    // Solo recargamos si nosotros disparamos SKIP_WAITING. Sin este guard, la
    // primera instalación del SW (clients.claim() inicial) provocaría un
    // reload espurio en visitantes nuevos.
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(!_didSkipWaiting||_reloading)return;
      _reloading=true;
      window.location.reload();
    });
  }).catch(()=>{});
}
</script>
